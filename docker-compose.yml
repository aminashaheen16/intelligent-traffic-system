version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: traffic_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./snapshots:/app/snapshots
      - ./videos:/app/videos

volumes:
  pgdata:
